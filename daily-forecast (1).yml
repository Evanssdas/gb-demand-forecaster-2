name: Daily demand forecast (self-grading)

on:
  schedule:
    - cron: "0 20 * * *"     # evening - yesterday's actual has published
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python predict.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions_log.csv
          git commit -m "demand forecast + grade $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push
